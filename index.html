<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>隨機抽簽分組</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* --------------------------------------------------------------
   1️⃣ 變數（支援暗色模式）                              
----------------------------------------------------------------- */
:root{
    --primary:#0066cc;
    --primary-dark:#004999;
    --primary-light:#cce5ff;
    --bg-main:#f9f9f9;
    --bg-card:#fff;
    --text:#222;
    --text-light:#fff;
    --shadow:0 4px 12px rgba(0,0,0,.08);
    --radius:10px;
    --touch-size:48px;      /* 最小觸控目標 */
}
@media (prefers-color-scheme: dark){
    :root{
        --bg-main:#121212;
        --bg-card:#1e1e1e;
        --text:#e0e0e0;
        --primary:#4ae2;
        --primary-dark:#337ab7;
        --primary-light:#3e5c7a;
    }
}

/* --------------------------------------------------------------
   2️⃣ 基本排版、按鈕、格子（保持與前一版相同）              
----------------------------------------------------------------- */
*{box-sizing:border-box;}
body{margin:0;font-family:system-ui,Arial,Helvetica,sans-serif;background:var(--bg-main);color:var(--text);}
h1{font-size:1.8rem;text-align:center;margin:1rem 0;}
.container{max-width:900px;margin:auto;padding:0 1rem;}
.controls{display:flex;gap:.8rem;justify-content:center;margin-bottom:.8rem;}
.controls button{
    flex:1;max-width:180px;padding:.6rem;font-size:1rem;
    background:var(--primary);color:var(--text-light);
    border:none;border-radius:var(--radius);
    cursor:pointer;transition:background .2s,transform .1s;
}
.controls button:hover{background:var(--primary-dark);}
.controls button:active{transform:scale(.96);}

/* ---------- 輸入區 ---------- */
.input-area{
    margin-bottom:1rem;
}
.input-area textarea{
    width:100%;height:200px;padding:.6rem;font-size:1rem;
    border:1px solid #ccc;border-radius:var(--radius);
    font-family:monospace;
}

/* ---------- 隨機分組按鈕 ---------- */
.btn{
    display:block;width:100%;max-width:260px;margin:0 auto 1.5rem;
    padding:.75rem 1rem;font-size:1rem;
    background:var(--primary);color:var(--text-light);
    border:none;border-radius:var(--radius);cursor:pointer;
    transition:background .2s,transform .1s;
}
.btn:hover{background:var(--primary-dark);}
.btn:active{transform:scale(.96);}

/* ---------- 複制按鈕 ---------- */
.copy-btn{
    display:block;width:100%;max-width:260px;margin:0 auto 1rem;
    padding:.5rem 1rem;font-size:.9rem;
    background:#28a745;color:#fff;
    border:none;border-radius:var(--radius);cursor:pointer;
    transition:background .2s,transform .1s;
}
.copy-btn:hover{background:#218838;}
.copy-btn:active{transform:scale(.96);}

/* --------------------------------------------------------------

/* --------------------------------------------------------------
   3️⃣ ★ 重點：更美觀的「結果卡」 ★
----------------------------------------------------------------- */

/* 讓卡片在手機上可以水平滑動（滑動容器） */
.result{
    display:flex;flex-wrap:nowrap;gap:1rem;
    overflow-x:auto;scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    padding-bottom:.5rem;   /* 防止卡片底部被裁切 */
}

/* 每張卡片 */
.group{
    background:var(--bg-card);
    flex:0 0 260px;                /* 手機上固定寬度，讓滑動感更明顯 */
    scroll-snap-align:start;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:1rem;
    display:flex;flex-direction:column;
    gap:.6rem;
    /* 進場動畫 */
    opacity:0;transform:translateY(20px);
    animation:fadeIn .45s forwards;
}

/* 卡片頭部 – 彩色橫幅 + 圓形編號 */
.group-header{
    display:flex;align-items:center;gap:.6rem;
}
.group-header .badge{
    width:2.2rem;height:2.2rem;
    border-radius:50%;background:var(--primary);
    color:var(--text-light);font-weight:600;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
}
.group-header h2{
    margin:0;font-size:1.2rem;
    color:var(--primary-dark);
}

/* 數字列表 – 使用「徽章」樣式，標記的會換成醒目顏色 */
.number-list{
    display:grid;
    grid-template-columns:repeat(2,1fr);   /* 兩欄排列 */
    gap:.4rem .6rem;
}
.number-list .num{
    background:#eaeaea;
    border-radius:var(--radius);
    padding:.4rem .6rem;
    text-align:center;
    font-weight:500;
    transition:background .2s,color .2s;
}
.number-list .num.marked{
    background:var(--primary-light);
    color:var(--primary-dark);
    font-weight:600;
}

/* 進場動畫 */
@keyframes fadeIn{
    to{opacity:1;transform:translateY(0);}
}

/* 手機等小螢幕的微調 */
@media (max-width:480px){
    h1{font-size:1.6rem;}
    .checklist label{font-size:1rem;}
    .btn{font-size:.95rem;}
}
</style>
</head>

<body>
<div class="container">
    <h1>隨機抽簽分組</h1>

    <p>請貼上清單（每行一個，*號為標記）：</p>
    <div class="input-area">
        <textarea id="inputList" placeholder="例如：
1 辰玲
2 趙
*3 茶
4 叉滴
..."></textarea>
    </div>

    <!-- 隨機分組 -->
    <button class="btn" onclick="distribute()">隨機分配到 3 組</button>

    <!-- 結果區（已套用更美觀的卡片） -->
    <div class="result" id="result"></div>
</div>

<script>
/* --------------------------------------------------------------
   基本變數 & 工具
----------------------------------------------------------------- */
const GROUP_COUNT = 3;                 // 三組

/* ---------- Fisher‑Yates 洗牌 ---------- */
function shuffle(arr){
    for (let i = arr.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
}

/* ---------- 解析輸入清單 ---------- */
function parseList(text) {
    const lines = text.trim().split('\n');
    const people = [];
    lines.forEach(line => {
        line = line.trim();
        if (!line) return;
        const isMarked = line.startsWith('*');
        const content = isMarked ? line.substring(1).trim() : line;
        // 假設格式是 "數字 姓名" 或 "姓名"
        const parts = content.split(/\s+/);
        const name = parts.slice(1).join(' ') || parts[0]; // 如果沒有數字，就取整個
        people.push({ name, marked: isMarked });
    });
    return people;
}

/* ---------- 核心分組程式 ---------- */
function distribute(){
    const inputText = document.getElementById('inputList').value;
    const people = parseList(inputText);
    if (people.length === 0) {
        alert('請輸入清單');
        return;
    }

    // 分離標記與普通
    const markedArr = people.filter(p => p.marked);
    const unmarkedArr = people.filter(p => !p.marked);

    // 三組容器
    const groups = Array.from({length:GROUP_COUNT},()=>[]);

    // 平均分配「標記」(盡量相等)
    const base  = Math.floor(markedArr.length / GROUP_COUNT);
    const extra = markedArr.length % GROUP_COUNT;   // 前 extra 組多 1 個
    shuffle(markedArr);
    let idx = 0;
    for (let g=0; g<GROUP_COUNT; g++){
        const need = base + (g<extra?1:0);
        for(let i=0;i<need;i++) groups[g].push(markedArr[idx++]);
    }

    // 隨機填滿普通姓名
    shuffle(unmarkedArr);
    let uIdx = 0;
    for (let g=0; g<GROUP_COUNT; g++){
        while(groups[g].length < Math.ceil(people.length / GROUP_COUNT) && uIdx < unmarkedArr.length){
            groups[g].push(unmarkedArr[uIdx++]);
        }
    }

    // 繪製結果卡
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '';               // 清除舊結果

    groups.forEach((grp,i)=>{
        const card = document.createElement('div');
        card.className = 'group';

        // 卡片標題
        const header = document.createElement('div');
        header.className = 'group-header';
        header.innerHTML = `
            <div class="badge">${i+1}</div>
            <h2>第 ${i+1} 組</h2>
        `;

        // 姓名列表（徽章樣式）
        const list = document.createElement('div');
        list.className = 'number-list';
        list.innerHTML = grp.map(p=>{
            const isMarked = p.marked;
            return `<div class="num${isMarked?' marked':''}">${p.name}</div>`;
        }).join('');

        card.appendChild(header);
        card.appendChild(list);
        resultDiv.appendChild(card);
    });

    // 添加複制按鈕
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = '一鍵複制成直條格式';
    copyBtn.onclick = () => copyToClipboard(groups);
    resultDiv.appendChild(copyBtn);
}

/* ---------- 複制到剪貼簿 ---------- */
function copyToClipboard(groups) {
    let text = '';
    groups.forEach((grp, i) => {
        text += `第${i+1}組：\n`;
        grp.forEach(p => {
            text += `${p.name}\n`;
        });
        text += '\n';
    });
    navigator.clipboard.writeText(text).then(() => {
        alert('已複制到剪貼簿！');
    }).catch(err => {
        console.error('複制失敗:', err);
        alert('複制失敗，請手動複制。');
    });
}
</script>
</body>
</html>
